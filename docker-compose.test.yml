services:
  keycloak:
    image: orkllm-keycloak-test:latest
    build:
      context: ./e2e
      dockerfile: Dockerfile.keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/realms/master/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
