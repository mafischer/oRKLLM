services:
  keycloak:
    build:
      context: ./e2e
      dockerfile: Dockerfile.keycloak
    command: start --optimized --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./e2e/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
